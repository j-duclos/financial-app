services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: budget
      POSTGRES_PASSWORD: budget
      POSTGRES_DB: budget
    ports:
      - "5433:5432"  # host 5433 to avoid conflict with local PostgreSQL on 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budget"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    # Local dev uses Docker Postgres (fast). Sync with Render via scripts/sync-db-*.sh when needed.
    # Web UI: npm run dev:web → http://localhost:5173 (API proxied to this service on :8000).
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://budget:budget@postgres:5432/budget
      DJANGO_SECRET_KEY: dev-secret-change-in-production
      DEBUG: "true"
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
