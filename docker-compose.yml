services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: budget
      POSTGRES_PASSWORD: budget
      POSTGRES_DB: budget
    ports:
      - "5433:5432"  # host 5433 to avoid conflict with local PostgreSQL on 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budget"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    # Loads PLAID_* (and DB settings) from ./backend/.env — host ${VAR:-} here would override with empty if unset.
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SECRET_KEY: dev-secret-change-in-production
      DEBUG: "true"
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      # Default: SQLite at ./backend/db.sqlite3 (mounted as /app/db.sqlite3). To use Postgres above instead:
      # DATABASE_URL: postgresql://budget:budget@postgres:5432/budget
