# Optional Blueprint — build/start commands only.
# https://render.com/docs/blueprint-spec
#
# IMPORTANT: Do NOT declare envVars here for an existing service. Blueprint sync can
# overwrite dashboard secrets (PLAID_*, DJANGO_SECRET_KEY, REDIS_URL, etc.). Set all
# environment variables in the Render Dashboard → Environment (or an Env Group).
# See RENDER_DEPLOYMENT.md § "Restore environment variables".
#
# PRODUCTION (multi-user): do NOT use Free for web or Postgres. Minimum viable:
#   Web Standard ($25/mo) — 1 CPU, 2 GB RAM, always on
#   Postgres Basic-1gb (~$19/mo) — 0.5 CPU, 1 GB RAM
#   Key Value / Redis Starter (~$7/mo) — set REDIS_URL on web service (timeline cache)
# See RENDER_DEPLOYMENT.md § Production stack.
services:
  - type: web
    name: financial-app
    runtime: python
    rootDir: backend
    buildCommand: chmod +x build.sh start.sh && ./build.sh
    startCommand: chmod +x start.sh && ./start.sh
