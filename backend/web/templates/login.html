{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<div class="login-page">
  <div class="login-box">
    <h1>Sign in</h1>
    <p style="color: var(--muted); font-size: 0.9rem;">Use your Django user account to access the test UI.</p>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="form-row">
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<div class="negative">{{ field.errors }}</div>{% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary">Log in</button>
    </form>
  </div>
</div>
{% endblock %}
