{% extends "base.html" %}
{% block title %}Edit transaction{% endblock %}
{% block content %}
<h1>Edit transaction</h1>
<p><a href="{% url 'web:transactions' %}">&larr; Transactions</a></p>
<div class="panel">
<form method="post">{% csrf_token %}
<div class="form-row"><label>Date</label><input class="input" type="date" name="date" value="{{ transaction.date|date:'Y-m-d' }}"></div>
<div class="form-row"><label>Payee</label><input class="input" name="payee" value="{{ transaction.payee }}"></div>
<div class="form-row"><label>Amount</label><input class="input" name="amount" step="0.01" value="{{ transaction.amount }}"></div>
<div class="form-row"><label>Memo</label><textarea class="input" name="memo" rows="2">{{ transaction.memo }}</textarea></div>
<div class="form-row"><label>Category</label>
<select class="select" name="category">
<option value="">—</option>
{% for c in categories %}
<option value="{{ c.pk }}" {% if transaction.category_id == c.pk %}selected{% endif %}>{{ c.name }}</option>
{% endfor %}
</select></div>
<div class="form-row"><label><input type="checkbox" name="cleared" {% if transaction.cleared %}checked{% endif %}> Cleared</label></div>
<button class="btn btn-primary" type="submit">Save</button>
<button class="btn btn-danger" name="action" value="delete" type="submit" onclick="return confirm('Delete this transaction?')">Delete</button>
</form></div>
{% endblock %}
